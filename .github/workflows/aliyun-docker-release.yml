name: 阿里云镜像发布 (OpenClaw)

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.mdx"
  workflow_dispatch:
    inputs:
      tag_override:
        description: '手动指定标签 (可选)'
        required: false
        default: ''

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取版本号
        id: info
        run: |
          # 从 package.json 获取版本号
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          # 获取短 SHA 作为临时标签
          echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v3
        with:
          registry: crpi-3xue8nhcpdub1pj3.cn-hongkong.personal.cr.aliyuncs.com
          username: ${{ secrets.ALI_USER }}
          password: ${{ secrets.ALI_PWD }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            crpi-3xue8nhcpdub1pj3.cn-hongkong.personal.cr.aliyuncs.com/therootlab/openclaw:latest
            crpi-3xue8nhcpdub1pj3.cn-hongkong.personal.cr.aliyuncs.com/therootlab/openclaw:${{ github.event.inputs.tag_override || steps.info.outputs.VERSION }}
            crpi-3xue8nhcpdub1pj3.cn-hongkong.personal.cr.aliyuncs.com/therootlab/openclaw:main
          # 缓存优化，加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
